name: Workflow Practice

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs: 
  linux_practise:
    runs-on: ubuntu-Latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: list files
        run: ls -l

      - name: make script executable
        run: chmod +x ./scripts/main.sh

      - name: run script
        run: ./scripts/main.sh       
          
      
      
        
      
      

 

       
